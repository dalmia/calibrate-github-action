# Example workflow for consumers — copy into their repo at
# .github/workflows/calibrate.yml and adjust the agent UUIDs / URLs.
name: Calibrate

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:   # lets you trigger a run by hand from the Actions tab

permissions:
  contents: read
  pull-requests: write   # required for the auto PR comment

jobs:
  agent-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: artpark/calibrate-github-action@v1
        with:
          api-key: ${{ secrets.CALIBRATE_API_KEY }}
          base-url: https://api.calibrate.example
          app-url: https://app.calibrate.example
          agents: REPLACE_WITH_AGENT_UUID_1,REPLACE_WITH_AGENT_UUID_2
          mode: gate
